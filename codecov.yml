codecov:
  require_ci_to_pass: true

coverage:
  status:
    project:
      default:
        target: 80%
        threshold: 2%
    patch:
      default:
        target: 80%
        threshold: 5%
        informational: true

ignore:
  # Generated code — no asserts of value.
  - "cmd/noxctl-codegen/**/*.go"
  # Bridge package: re-exports the closed catalog of hardcoded domains
  # for the migration window. Trivial passthrough, exercised end-to-end
  # via integration tests.
  - "registry/**/*.go"
  # Test fixtures (analyzer testdata).
  - "tools/cyrillic-lint/cyrillic/testdata/**"
  # CLI entry points: `package main` cannot be externally unit-tested
  # (Go forbids importing a main package as a library), and the project
  # rule forbids `*_test.go` inside production package directories.
  # Coverage on cobra wiring + flag plumbing comes from integration runs
  # against the live vault (ship-gate.sh) rather than per-package tests.
  #
  # Glob form is load-bearing: `<dir>/**/*.go` fails to match files that
  # live directly in <dir> (no intermediate path segment for `**/` to
  # consume), so codecov kept counting cmd/noxctl/*.go at 0% and dragged
  # the project total down ~6pp. `<dir>/**` (gitignore-style, matches
  # direct children + nested) is the reliable form.
  - "cmd/noxctl/**"
  - "cmd/regen-watchd/**"

comment:
  layout: "condensed_header, condensed_files, condensed_footer"
  require_changes: true
