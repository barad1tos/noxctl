# noxctl i18n catalog — en locale.
#
# Mirrors uk.toml key-for-key with English equivalents. The
# domain-specific catalog keys (`library.poetry.*`, `it.*`, etc.)
# are part of the maintainer's reference vault and ship in every
# locale so a future English-language operator can opt into a
# parallel structure without writing their own catalog.
#
# Lookup: `bear.T(key)`. Missing keys fall through to the
# swappable `missingKeyHandler` (default: log.Fatalf) — adding a
# new key in uk.toml without adding the en.toml sibling will fail
# fast at first render.

# --- Generic master/hub section labels (bear/renderers.go, bear/factory.go,
# --- bear/subtag.go) ---
