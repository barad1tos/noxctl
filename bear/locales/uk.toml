# noxctl i18n catalog — uk locale.
#
# Locked by D-10: catalog format is TOML, single file per locale, embedded
# via `//go:embed locales/*.toml`. Future locales drop sibling files
# (en.toml, etc.) without recompile-shape changes.
#
# Keys follow `dot.separated.lowercase` convention. Naming is grouped by
# subsystem then by domain; the lookup function is `bear.T(key)`. Missing
# keys at runtime invoke the swappable `missingKeyHandler` (default:
# `log.Fatalf`) so a typo surfaces as a fast failure, never a silent
# fallback (I18N-03).

