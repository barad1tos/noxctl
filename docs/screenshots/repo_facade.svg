<svg viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="noxctl — declarative bear notes for the terminal">
  <title>noxctl</title>
  <desc>Stylized GitHub banner for the noxctl CLI — a declarative Terraform-style tool for Bear Notes.</desc>

  <defs>
    <!-- Ayu Dark background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B0E14"/>
      <stop offset="1" stop-color="#11151C"/>
    </linearGradient>

    <!-- Soft amber moon halo -->
    <radialGradient id="moonHalo" cx="300" cy="320" r="260" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E6B450" stop-opacity="0.30"/>
      <stop offset="0.45" stop-color="#E6B450" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#E6B450" stop-opacity="0"/>
    </radialGradient>

    <!-- Moon body gradient -->
    <linearGradient id="moonFill" x1="150" y1="170" x2="450" y2="470" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFD173"/>
      <stop offset="1" stop-color="#E6B450"/>
    </linearGradient>

    <!-- Cutout matches bg color at moon location for seamless crescent -->
    <linearGradient id="cutoutMatch" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B0E14"/>
      <stop offset="1" stop-color="#11151C"/>
    </linearGradient>
  </defs>

  <!-- Base canvas -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Faint horizontal grid (subtle texture) -->
  <g stroke="#BFBDB6" stroke-width="1" opacity="0.025">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
  </g>

  <!-- Starfield -->
  <g fill="#BFBDB6">
    <circle cx="92" cy="78" r="1.3" opacity="0.55"/>
    <circle cx="178" cy="142" r="0.9" opacity="0.4"/>
    <circle cx="58" cy="226" r="1" opacity="0.45"/>
    <circle cx="528" cy="98" r="1.1" opacity="0.5"/>
    <circle cx="612" cy="188" r="0.8" opacity="0.35"/>
    <circle cx="124" cy="506" r="1.2" opacity="0.5"/>
    <circle cx="488" cy="556" r="0.9" opacity="0.4"/>
    <circle cx="544" cy="472" r="1" opacity="0.45"/>
    <circle cx="218" cy="566" r="0.8" opacity="0.35"/>
    <circle cx="34" cy="402" r="0.8" opacity="0.3"/>
    <circle cx="954" cy="92" r="0.9" opacity="0.35"/>
    <circle cx="1098" cy="76" r="1.1" opacity="0.45"/>
    <circle cx="1184" cy="198" r="0.8" opacity="0.3"/>
    <circle cx="1216" cy="462" r="0.9" opacity="0.35"/>
    <circle cx="1086" cy="548" r="1" opacity="0.4"/>
    <circle cx="852" cy="582" r="0.9" opacity="0.35"/>
    <circle cx="918" cy="498" r="0.8" opacity="0.3"/>
    <circle cx="1148" cy="358" r="0.8" opacity="0.3"/>
  </g>

  <!-- Moon halo (amber bloom around the moon) -->
  <circle cx="300" cy="320" r="260" fill="url(#moonHalo)"/>

  <!-- Moon: full amber disc -->
  <circle cx="300" cy="320" r="155" fill="url(#moonFill)"/>

  <!-- Crescent cutout: bg-colored disc overlaid to carve the crescent -->
  <circle cx="370" cy="270" r="128" fill="url(#cutoutMatch)"/>

  <!-- Bear paw stamped on the amber portion of the moon -->
  <g transform="translate(160, 288)" fill="#0B0E14">
    <!-- Main pad: rounded plantar shape -->
    <path d="M 44 36
             C 20 36, 6 56, 6 74
             C 6 94, 24 108, 44 108
             C 64 108, 82 94, 82 74
             C 82 56, 68 36, 44 36 Z"
          opacity="0.85"/>
    <!-- Toe pads arranged in arc above the pad -->
    <ellipse cx="10"  cy="16" rx="7" ry="11" opacity="0.85"/>
    <ellipse cx="29"  cy="2"  rx="7" ry="11" opacity="0.85"/>
    <ellipse cx="59"  cy="2"  rx="7" ry="11" opacity="0.85"/>
    <ellipse cx="78"  cy="16" rx="7" ry="11" opacity="0.85"/>
  </g>

  <!-- ============ TYPOGRAPHY ============ -->
  <g font-family="ui-monospace, 'JetBrains Mono', 'Fira Code', Menlo, Monaco, Consolas, monospace">

    <!-- Shell prompt -->
    <text x="560" y="345" font-size="92" font-weight="600" fill="#E6B450">$</text>

    <!-- Wordmark -->
    <text x="640" y="345" font-size="138" font-weight="800" fill="#BFBDB6" letter-spacing="-4">noxctl</text>

    <!-- Blinking cursor block -->
    <rect x="1118" y="240" width="28" height="118" fill="#E6B450" opacity="0.92">
      <animate attributeName="opacity" values="0.92;0.08;0.92" dur="1.1s" repeatCount="indefinite"/>
    </rect>

    <!-- Tagline -->
    <text x="562" y="410" font-size="30" font-weight="400" fill="#626A73" letter-spacing="0.3">
      <tspan fill="#39BAE6" opacity="0.85">//</tspan> Terraform for Bear
    </text>

    <!-- Discreet subtitle -->
    <text x="562" y="478" font-size="20" font-weight="500" fill="#5C6773" letter-spacing="2" opacity="0.7">
      <tspan fill="#AAD94C" opacity="0.7">›</tspan> NOX · CONTROL · LAYER
    </text>

  </g>

  <!-- Minimal corner brackets (terraform-block hint) -->
  <g stroke="#E6B450" stroke-width="1.5" fill="none" opacity="0.32">
    <path d="M 48 48 L 48 84 M 48 48 L 84 48"/>
    <path d="M 1232 48 L 1232 84 M 1232 48 L 1196 48"/>
    <path d="M 48 592 L 48 556 M 48 592 L 84 592"/>
    <path d="M 1232 592 L 1232 556 M 1232 592 L 1196 592"/>
  </g>
</svg>
