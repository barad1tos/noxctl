# noxctl.toml — maintainer's full 28-domain real-world reference
#
# The catalog Roman uses against his actual Bear vault. Covers every
# blueprint (flat-list, grouped-vertical, hub-routed,
# hub-routed-with-subtag, umbrella) and demonstrates promotions,
# umbrella+leaves relationships, and locale-specific (`uk`) hub /
# master titles.
#
# This is reference material, not a starter. For getting-started
# starters see `examples/minimal.toml` (1 domain) or
# `examples/three-blueprints.toml` (three blueprints side-by-side).
# For single-blueprint focus see `examples/<blueprint>.toml`.

[meta]
  version = "1"
  locale = "uk"
  bear_db = ""
  daily_default_tag = "quicknote/daily"

[[promotion]]
  from = "quicknote/daily"
  to = "quicknote/weekly"
  boundary = "day"

[[promotion]]
  from = "quicknote/weekly"
  to = "quicknote/monthly"
  boundary = "week"

[[promotion]]
  from = "quicknote/monthly"
  to = "quicknote/yearly"
  boundary = "month"

[[promotion]]
  from = "quicknote/yearly"
  to = "quicknote/decadal"
  boundary = "year"

[[domain]]
  tag = "library/poetry"
  index_title = "✱ Поезія"
  blueprint = "hub-routed"
  unknown_bucket = "Невідомі"
  hub_h2_prefix = "Поеми"
  hub_h2_legacy = ["Поезії"]
  own_group = "Моя поезія"
  own_aliases = ["Моя поезія", "Мої"]
  legacy_author_fallback = true
  strip_legacy_author_h2 = true

[[domain]]
  tag = "library/aphorisms"
  index_title = "✱ Афоризми"
  blueprint = "grouped-vertical"
  unknown_bucket = "Невідомі"
  buckets = ["Книги", "Кіно", "Ігри"]

[[domain]]
  tag = "library/articles"
  index_title = "✱ Статті"
  blueprint = "hub-routed"
  unknown_bucket = "Інші"
  hub_h2_prefix = "Статті"
  own_group = "Мої статті"
  own_aliases = ["Мої статті"]
  legacy_author_fallback = false
  strip_legacy_author_h2 = false

[[domain]]
  tag = "library/lyrics"
  index_title = "✱ Тексти"
  blueprint = "hub-routed"
  unknown_bucket = "Невідомі"
  hub_h2_prefix = "Пісні"
  legacy_author_fallback = true
  strip_legacy_author_h2 = true

  [[domain.master_section]]
    title = "Іноземні"
    script = "latin"
    count_mode = "buckets"
    show_bullet_counts = false

  [[domain.master_section]]
    title = "СНГ"
    script = "non-latin"
    count_mode = "buckets"
    show_bullet_counts = false

[[domain]]
  tag = "library/prose"
  index_title = "✱ Проза"
  blueprint = "grouped-vertical"
  unknown_bucket = "Мої"
  buckets = ["Мої", "Чужі"]

[[domain]]
  tag = "library/quotes"
  index_title = "✱ Цитати"
  blueprint = "hub-routed"
  unknown_bucket = "Без джерела"
  hub_h2_prefix = "Цитати"
  legacy_author_fallback = true
  strip_legacy_author_h2 = true

  [[domain.master_section]]
    title = "Джерела"

[[domain]]
  tag = "llm/agents"
  index_title = "✱ LLM Агенти"
  blueprint = "hub-routed"
  unknown_bucket = "uncategorized"
  hub_h2_prefix = "Агенти"
  legacy_author_fallback = false
  strip_legacy_author_h2 = false

  [[domain.master_section]]
    title = "Розробка"
    buckets = [
      "angular", "cpp", "csharp", "django", "dotnet", "elixir", "flutter",
      "go", "java", "javascript", "kotlin", "laravel", "nextjs", "php",
      "powershell", "python", "react", "ruby", "rust", "spring", "sql",
      "swift", "typescript", "vue",
      "development", "dx", "meta",
    ]

  [[domain.master_section]]
    title = "Інфра / Дані"
    buckets = ["infrastructure", "devops", "data"]

  [[domain.master_section]]
    title = "Якість"
    buckets = ["quality"]

  [[domain.master_section]]
    title = "Координація"
    buckets = ["orchestration"]

  [[domain.master_section]]
    title = "Бізнес"
    buckets = ["business", "research", "domains"]

  [[domain.master_section]]
    title = "Інше"

