# noxctl.toml — truly-minimal starter (1 domain, flat-list)
#
# The smallest catalog that does something useful. Copy this file
# to ~/.config/noxctl/noxctl.toml, change the `tag` and
# `index_title` to match a Bear tag you already use (or invent a
# new one), and run `noxctl validate <path>` to confirm.
#
# This is the absolute minimum to get started. For a richer starter
# with three blueprints side-by-side see `examples/three-blueprints
# .toml`. For a full real-world reference covering every blueprint
# (umbrella, hub-routed, grouped-vertical, hub-routed-with-subtag)
# see `examples/personal.toml`.

[meta]
  version = "1"

# flat-list: every note tagged `inbox` becomes a wikilink bullet
# on a single master note titled "✱ Inbox". Simplest blueprint —
# zero buckets, zero sub-tags, zero required fields beyond the
# three below. Great for capture-style tags where order and
# categorization don't matter.
[[domain]]
  tag         = "inbox"
  index_title = "✱ Inbox"
  blueprint   = "flat-list"
