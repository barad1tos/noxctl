# noxctl.toml — grouped-vertical blueprint example
#
# grouped-vertical renders one master with a vertical `## Bucket (N)`
# H2 section per bucket, atoms listed as bullets under each. Good for
# bucketed collections, especially when buckets hold many atoms.
#
# The atom-canonicalization variant is selected automatically by tag
# depth (you do not pick it):
#   - top-level tag (e.g. "reading")     -> buckets become real
#     `#reading/<bucket>` sub-tags, so Bear's sidebar shows the
#     2-level tree. (This example.)
#   - already-2-level tag (e.g. "lib/x") -> a 3-level sub-tag is
#     forbidden by the flatness rule, so the bucket lives in the
#     canonical header's 3rd segment: `#lib/x | [[Index]] | <bucket>`.
# Either way the rendered master is byte-identical.
#
# What it produces:
#   ## Books (N)
#   - [[Atom A]]
#   - [[Atom B]]
#
#   ## Talks (M)
#   - [[Atom C]]
#
# Required: tag, index_title, blueprint, buckets, unknown_bucket.
# Atoms whose bucket is not in `buckets` land under `unknown_bucket`.

[meta]
  version = "1"

[[domain]]
  tag            = "reading"
  index_title    = "✱ Reading"
  blueprint      = "grouped-vertical"
  buckets        = ["Books", "Articles", "Papers", "Talks"]
  unknown_bucket = "Other"
