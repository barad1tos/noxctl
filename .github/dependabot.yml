version: 2
updates:
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    cooldown:
      # Actions pin to commit-SHA / tag references, not semver — Dependabot
      # rejects `semver-major-days` under this ecosystem. Default-days still
      # applies uniformly to every action update.
      default-days: 3
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"

  # Go modules — root module.
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    cooldown:
      default-days: 3
      semver-major-days: 7
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "go"
    commit-message:
      prefix: "chore"
      include: "scope"

  # Go modules — cyrillic-lint analyzer sub-module.
  - package-ecosystem: "gomod"
    directory: "/tools/cyrillic-lint"
    schedule:
      interval: "weekly"
      day: "monday"
    cooldown:
      default-days: 3
      semver-major-days: 7
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "go"
      - "tools"
    commit-message:
      prefix: "chore"
      include: "scope"
