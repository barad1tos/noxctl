name: CI

on:
  push:
    branches: [main]
    paths-ignore: &skip-paths
      - '**/*.md'
      - 'LICENSE'
      - '.gitignore'
      - '.pre-commit-config.yaml'
  pull_request:
    branches: [main]
    paths-ignore: *skip-paths
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.26.2'

jobs:
  # ── Tier 1: Fast file-level checks (no toolchain, seconds) ──
  lint-files:
    name: Lint files
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Check trailing whitespace
        run: |
          ! git grep -rIl '[[:blank:]]$' -- \
            ':!*.zip' ':!*.png' ':!*.svg' \
            || { echo "::error::Trailing whitespace found"; exit 1; }
      - name: Validate YAML
        run: |
          find . -name '*.yml' -o -name '*.yaml' | while read f; do
            python3 -c "import yaml; yaml.safe_load(open('$f'))" \
              || { echo "::error::Invalid YAML: $f"; exit 1; }
          done
      - name: Validate JSON
        run: |
          find . -name '*.json' -not -path './tests/bear/testdata/*' | while read f; do
            python3 -c "import json; json.load(open('$f'))" \
              || { echo "::error::Invalid JSON: $f"; exit 1; }
          done
      - name: Check for large files (>500KB)
        run: |
          found=0
          while IFS= read -r f; do
            echo "::error::Large file detected: $f ($(du -h "$f" | cut -f1))"
            found=1
          done < <(find . -not -path '*/.git/*' -not -path '*/vendor/*' \
            -type f -size +500k \
            -not -name '*.zip')
          if [ "$found" -eq 1 ]; then exit 1; fi
      - name: Check for merge conflict markers
        run: |
          ! git grep -rIl '<<<<<<<\|>>>>>>>' -- \
            ':!*.md' ':!.github/workflows/*' \
            || { echo "::error::Merge conflict markers found"; exit 1; }
      - name: Detect private keys
        run: |
          pattern="BEGIN.*(RSA |DSA |EC |OPENSSH )?PRIVATE KEY"
          ! git grep -rIlE "$pattern" \
            -- ':!*.md' ':!.pre-commit-config.yaml' \
            ':!.github/workflows/*' \
            || { echo "::error::Private key detected"; exit 1; }

  # ── Tier 1: GitHub Actions security audit (zizmor) ──
  gha-security:
    name: GHA security (zizmor)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
      - name: Scan workflows for vulnerabilities
        run: uvx zizmor --min-severity medium .

  # ── Tier 2: Go build (single platform — macOS, matches runtime target) ──
  build:
    name: Build
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v6.0.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: go build
        run: go build ./...
      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt issues in:"
            echo "$unformatted"
            exit 1
          fi
      - name: go vet
        run: go vet ./...

  # ── Tier 3: Static analysis (golangci-lint, parallel with test) ──
  lint:
    name: Lint (golangci-lint)
    runs-on: macos-latest
    needs: build
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v6.0.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - uses: golangci/golangci-lint-action@e5a9d7b91c39c95f4d51b2e3d4ce5c0f4cc6e0a8 # v7.0.0
        with:
          version: v2.0.2
          args: --timeout=5m

  # ── Tier 3: Unit + integration tests (parallel with lint) ──
  test:
    name: Test
    runs-on: macos-latest
    needs: build
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v6.0.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Run tests with race detector + coverage
        run: |
          go test -count=1 -race -coverprofile=coverage.out -covermode=atomic ./...
      - name: Upload coverage to Codecov
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v5
        with:
          files: coverage.out
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
