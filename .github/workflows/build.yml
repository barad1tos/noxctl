name: CI

on:
  push:
    branches: [main]
    paths-ignore: &skip-paths
      - '**/*.md'
      - 'LICENSE'
      - '.gitignore'
      - '.pre-commit-config.yaml'
  pull_request:
    branches: [main]
    paths-ignore: *skip-paths
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.26.2'

jobs:
  # ── Tier 1: Fast file-level checks (no toolchain, seconds) ──
  lint-files:
    name: Lint files
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Check trailing whitespace
        run: |
          ! git grep -rIl '[[:blank:]]$' -- \
            ':!*.zip' ':!*.png' ':!*.svg' \
            || { echo "::error::Trailing whitespace found"; exit 1; }
      - name: Validate YAML
        run: |
          find . -name '*.yml' -o -name '*.yaml' | while read f; do
            python3 -c "import yaml; yaml.safe_load(open('$f'))" \
              || { echo "::error::Invalid YAML: $f"; exit 1; }
          done
      - name: Validate JSON
        run: |
          find . -name '*.json' -not -path './tests/bear/testdata/*' | while read f; do
            python3 -c "import json; json.load(open('$f'))" \
              || { echo "::error::Invalid JSON: $f"; exit 1; }
          done
      - name: Check for large files (>500KB)
        run: |
          found=0
          while IFS= read -r f; do
            echo "::error::Large file detected: $f ($(du -h "$f" | cut -f1))"
            found=1
          done < <(find . -not -path '*/.git/*' -not -path '*/vendor/*' \
            -type f -size +500k \
            -not -name '*.zip')
          if [ "$found" -eq 1 ]; then exit 1; fi
      - name: Check for merge conflict markers
        run: |
          ! git grep -rIl '<<<<<<<\|>>>>>>>' -- \
            ':!*.md' ':!.github/workflows/*' \
            || { echo "::error::Merge conflict markers found"; exit 1; }
      - name: Detect private keys
        run: |
          pattern="BEGIN.*(RSA |DSA |EC |OPENSSH )?PRIVATE KEY"
          ! git grep -rIlE "$pattern" \
            -- ':!*.md' ':!.pre-commit-config.yaml' \
            ':!.github/workflows/*' \
            || { echo "::error::Private key detected"; exit 1; }

  # ── Tier 1: GitHub Actions security audit (zizmor) ──
  gha-security:
    name: GHA security (zizmor)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - name: Scan workflows for vulnerabilities
        run: uvx zizmor --min-severity medium .

  # ── Tier 2: Go build (single platform — macOS, matches runtime target) ──
  build:
    name: Build
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v6.0.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: go build
        run: go build ./...
      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt issues in:"
            echo "$unformatted"
            exit 1
          fi
      - name: go vet
        run: go vet ./...

  # ── Tier 3: Static analysis (golangci-lint, parallel with test) ──
  lint:
    name: Lint (golangci-lint)
    runs-on: macos-latest
    needs: build
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v6.0.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          # v2.12.2 is built with Go 1.26.2 — earlier 2.0.x was built
          # with Go 1.24 and refused to lint a Go-1.26-targeted repo.
          version: v2.12.2
          args: --timeout=5m

  # ── Tier 3: Unit + integration tests (parallel with lint) ──
  test:
    name: Test
    runs-on: macos-latest
    needs: build
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v6.0.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Install gotestsum
        # gotestsum wraps `go test --json` and emits JUnit XML for Codecov
        # Test Analytics. Pinned version for reproducibility — bump via
        # dependabot or manually.
        run: go install gotest.tools/gotestsum@v1.13.0
      - name: Run tests with race detector + coverage
        # gotestsum forwards args after `--` to `go test` unchanged.
        # --rerun-fails=0: disable auto-rerun so Codecov sees true flakiness.
        # --junitfile-testsuite-name=relative: shorter package paths in UI.
        run: |
          mkdir -p test-results coverage-e2e
          NOXCTL_E2E_COVERDIR="$PWD/coverage-e2e" gotestsum \
            --junitfile test-results/junit.xml \
            --junitfile-testsuite-name relative \
            --format pkgname \
            --rerun-fails=0 \
            -- -count=1 -race -coverpkg=./... \
               -coverprofile=coverage.out -covermode=atomic \
               ./...
          go tool covdata textfmt -i=coverage-e2e -o=coverage-e2e.out
      - name: Upload coverage to Codecov
        if: ${{ !cancelled() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v5
        with:
          files: coverage.out,coverage-e2e.out
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload test results to Codecov
        # Test Analytics: flaky detection, failure trends, slow tests.
        # Same action as coverage; `report-type: test_results` switches
        # mode to consume JUnit XML produced by gotestsum.
        if: ${{ !cancelled() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v5
        with:
          files: test-results/junit.xml
          report-type: test_results
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
