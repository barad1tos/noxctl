# golangci-lint v2 configuration for regen-watchd.
#
# Mirrors the Sonar-style thresholds the CI/IDE pipeline already enforces so
# `golangci-lint run` locally surfaces the same findings before they reach
# the editor's inline annotations. Keep these limits in sync with whatever
# the IDE shows — moving them here without coordinating with the IDE setup
# defeats the purpose of having a single source of truth.

version: "2"

run:
  timeout: 2m
  tests: true

linters:
  default: none
  enable:
 # Correctness
    - errcheck     # unchecked errors
    - govet        # built-in vet checks
    - ineffassign  # unused assignments
    - staticcheck  # extensive static analysis
    - unused       # unused identifiers
 # Style / consistency
    - misspell     # English spelling typos
    - unconvert    # redundant type conversions
 # Complexity (matches Sonar thresholds)
    - gocognit     # cognitive complexity per function
    - gocyclo      # cyclomatic complexity
    - dupl         # duplicate code blocks
    - lll          # line length
 # Naming / style
    - revive       # general golint-style naming + style
 # Dead code
    - unparam      # unused function parameters
 # Go ≥1.24 idiom upgrades (slices.Contains, strings.{SplitSeq,FieldsSeq,Cut}, …).
 # Replaces former forbidigo entry; Cyrillic-literal ban now lives in
 # tools/cyrillic-lint (wired through pre-commit).
    - modernize

  settings:
    govet:
 # Built-in `shadow` analyzer is opt-in. Enable it so accidental
 # `if err:= …` shadows of an outer `err` (or any other binding) get
 # flagged at the same time as the rest of vet. `strict: true` makes
 # the analyzer flag ALL shadows, not just the conservative subset
 # the default mode catches — matches gopls IDE behavior so editor
 # warnings and CI lint agree.
      enable:
        - shadow
      settings:
        shadow:
          strict: true
    gocognit:
 # Sonar's default is 15 — match it so IDE warnings agree with CLI.
      min-complexity: 15
    gocyclo:
      min-complexity: 15
    dupl:
 # Tokens, not lines. Tuned by bisection after extracting every real
 # duplication into bear/domain/factory.go (NewFlatTableDomain,
 # NewFlatListDomain, NewHubRoutedDomain) and domain.SortTitles helper.
 # Bisect map after refactor:
 # threshold ≤ 20 → 9 findings, all genuine Go idioms (error
 # wrapping `if err != nil { return fmt.Errorf }`,
 # wikilink shape check, callback signature
 # mirror between struct field and function impl)
 # threshold ≥ 30 → 0 findings
 # 30 is the lowest viable threshold. Lower values flag language-
 # natural patterns whose extraction would hurt readability. Re-run
 # bisection after any structural change before relaxing.
      threshold: 30
    lll:
 # 120 lines up with the Go community baseline (gofumpt's default,
 # most public Go codebases sit at 100-120). The previous 150 ceiling
 # let composite literals stay glued onto one line — gofmt only
 # vertical-izes a struct literal when fields don't fit, so a slack
 # lll budget produced unreadable horizontal walls. Pair this with
 # the gofumpt formatter below to keep keyed multi-line struct
 # literals consistent across the codebase.
      line-length: 120
      tab-width: 4
    misspell:
      locale: US
      # `synctest` is the Go ≥1.24 stdlib package `testing/synctest`;
      # misspell's default dictionary flags it as a typo of "synthetic"
      # or similar. Allow-list the real symbol so the IDE stops
      # underlining every legitimate import + call site.
      ignore-rules:
        - synctest
      # client9/misspell ships a common-typo dictionary keyed by locale,
      # but it does NOT cover every British→American variant pair —
      # `canonicalisation`/`canonicalised`/`canonicaliser` are
      # domain-specific tech terms missing from the default table.
      # Extra-words fills the gap so the linter catches them too.
      extra-words:
        - typo: canonicalisation
          correction: canonicalization
        - typo: canonicalised
          correction: canonicalized
        - typo: canonicalises
          correction: canonicalizes
        - typo: canonicalising
          correction: canonicalizing
        - typo: canonicaliser
          correction: canonicalizer
        - typo: canonicalisers
          correction: canonicalizers
        - typo: canonicalise
          correction: canonicalize
    revive:
      severity: warning
      rules:
        - name: var-naming
        - name: error-return
        - name: error-naming
        - name: exported
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unused-parameter
        - name: unreachable-code

  exclusions:
 # Don't apply default preset exclusions — the noise filter hides genuine
 # warnings. Explicit rules below cover the legitimate exemptions.
    generated: lax
    presets:
      - common-false-positives
    rules:
 # Migration scripts under /tmp are one-shot; they live outside the module.
      - path: 'tmp/'
        linters:
          - errcheck
          - govet
          - ineffassign
          - staticcheck
          - unused
          - misspell
          - unconvert
          - gocognit
          - gocyclo
          - dupl
          - lll
          - revive
          - unparam
 # Tests get a relaxed line-length budget: assertion error messages
 # carry full debug context (counts, expected vs got, log excerpts)
 # and Bear-callback URL fixtures legitimately reach ~140 chars.
 # Production code stays under 120; tests are exempt because the
 # readability win is the inverse — wrapping long Errorf strings
 # buries the diagnostic detail.
      - path: '_test\.go$'
        linters:
          - lll
 # Test files exempt from dupl: table-driven cases, fixture
 # constructors, and assertion blocks legitimately repeat similar
 # struct literals across scenarios. Extracting a helper for every
 # ≥50-token repetition hides the test intent behind indirection.
 # Production code stays bound to the threshold; tests do not.
      - path: '_test\.go$'
        linters:
          - dupl

formatters:
  enable:
    - gofmt      # canonical formatting
    - gofumpt    # stricter gofmt — forces one-field-per-line on
                 # multi-line composite literals (kills horizontal
                 # struct-literal walls) and a handful of other
                 # tightenings that gofmt leaves to taste.
    - goimports  # import grouping
